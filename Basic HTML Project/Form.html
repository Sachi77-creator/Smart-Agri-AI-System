<!DOCTYPE>
<html>
  <head>
   <link rel="stylesheet" href="style.css"> 
  </head>
  <body>
      <h1>Survey Form</h1>
      <form id="form">
      <div class="form-control">
        <label for="name" id="label-name">Name</label><br>
        <input type="text" id="name" placeholder="Enter your name">
      </div>
      <div class="form-control">
        <label for="email" id="label-email">Email</label><br>
        <input type="email" id="email" placeholder="Enter your e-mail">
      </div>
      <div>
        <label for="age" id="label-age">Age</label><br>
        <input type="text" id="age" placeholder="Enter your age">
      </div>
      <div class="form-control">
        <label for="role" id="label-role">Which option describes you?</label><br>
        <select>
            <option value="Student">Student</option>
            <option value="intern">Intern</option>
            <option value="Professional">Professional</option>
            <option value="other">Other</option>
        </select>
      </div>
       <div class="form-control">
        <label>
            Languages and Frameworks Known<small>(Check all that apply)</small><br>
        </label>
            <label>
                <input type="checkbox">C<br>
                <input type="checkbox">C++<br>
                <input type="checkbox">C#<br>
                <input type="checkbox">Java<br>
                <input type="checkbox">Python<br>
                <input type="checkbox">JavaScript<br>
                <input type="checkbox">Spring<br>
            </label>
       </div>
       <div class="form-control">
        <label for="comments" id="suggestions">Any comments or suggestions</label><br>
        <input type="text" placeholder="Enter your comment here">
       </div>
       <hr>
       <div>
        <center>
             <button type="submit" value="'submit">Submit</button>
        </center>
       </div>
  </body>

</html>
