name: Deploy Smart Agriculture System

on:
  push:
    branches:
      - main  # This triggers the deployment every time you push code to GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # 1. Navigate to the backend folder
            cd /home/Sachin/backend

            # 2. Pull the newest code from GitHub
            # We use -f to force it in case of small file conflicts
            git fetch --all
            git reset --hard origin/main

            # 3. Stop the old Python process running on port 5000
            # 'fuser -k' finds the process using the port and stops it
            sudo fuser -k 5000/tcp || true

            # 4. Start the Python AI backend again in the background
            # 'nohup' keeps it running even after GitHub logs out
            nohup python3 app.py > /dev/null 2>&1 &

            echo "Smart Agri System successfully updated on Azure VM!"