name: Deploy Smart Agriculture System

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # 1. Navigate to the main folder on the VM
            cd /home/Sachin/backend

            # 2. Force update code from GitHub
            git fetch --all
            git reset --hard origin/main

            # 3. Go into the backend folder
            cd backend

            # 4. Set up the Virtual Environment (Fixes the PIP error)
            sudo apt update && sudo apt install python3-venv -y
            python3 -m venv venv
            source venv/bin/activate
            pip install flask flask-cors

            # 5. Stop the old AI process and start the new one
            sudo fuser -k 5000/tcp || true
            nohup venv/bin/python3 app.py > /dev/null 2>&1 &
            
            echo "Smart Agri System is now LIVE and using a Virtual Environment!"