name: Deploy Smart Agriculture System

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # 1. Navigate to the folder on the VM
            cd /home/Sachin/backend

            # 2. Update code from GitHub
            git fetch --all
            git reset --hard origin/main

            # 3. Go into the backend folder (based on your folder list)
            cd SmartAgri/backend

            # 4. Stop old process and start new one
            sudo fuser -k 5000/tcp || true
            nohup python3 app.py > /dev/null 2>&1 &
            
            echo "Smart Agri System successfully updated!"